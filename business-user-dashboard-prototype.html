<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>业务异常监控</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #fff;
      --text: #182230;
      --muted: #667085;
      --line: #d9e0e8;
      --soft: #f8fafc;
      --brand: #e88a00;
      --blue: #2563eb;
      --green: #159947;
      --red: #dc2626;
      --orange: #d97706;
      --purple: #7c3aed;
      --radius: 8px;
      --shadow: 0 16px 36px rgba(15, 23, 42, .12);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      font-size: 14px;
    }
    button, input, select { font: inherit; }
    button { cursor: pointer; }

    .topbar {
      min-height: 70px;
      background: rgba(255,255,255,.95);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 28px;
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(10px);
    }
    h1 { margin: 0; font-size: 21px; }
    .subtitle { margin: 4px 0 0; color: var(--muted); font-size: 12px; }
    .top-actions { display: flex; align-items: center; justify-content: flex-end; gap: 10px; flex-wrap: wrap; color: var(--muted); font-size: 12px; }
    .top-actions strong { display: block; color: var(--text); font-size: 12px; }

    .btn, .icon-btn {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      padding: 0 12px;
    }
    .icon-btn { width: 38px; padding: 0; font-size: 17px; }
    .primary { background: var(--brand); border-color: var(--brand); color: #fff; font-weight: 700; }
    .danger { background: #fff1f2; border-color: #fecdd3; color: var(--red); }

    .content { max-width: 1560px; margin: 0 auto; padding: 18px 28px 36px; }

    .filters, .panel, .kpi {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }
    .filters {
      padding: 12px;
      display: grid;
      grid-template-columns: 180px minmax(280px, 1fr) auto;
      gap: 10px;
      align-items: center;
    }
    .field {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 0 11px;
      color: var(--text);
    }

    .source {
      margin-top: 12px;
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      color: #1e3a8a;
      border-radius: 8px;
      padding: 10px 12px;
      line-height: 1.55;
      font-size: 13px;
    }
    .source.warn { border-color: #fed7aa; background: #fff7ed; color: #92400e; }

    .kpis { margin-top: 14px; display: grid; grid-template-columns: repeat(5, minmax(150px, 1fr)); gap: 12px; }
    .kpi { padding: 14px; display: grid; gap: 8px; }
    .kpi label { color: var(--muted); font-size: 12px; }
    .kpi strong { font-size: 24px; }
    .kpi span { color: var(--muted); font-size: 12px; }

    .panel { margin-top: 14px; overflow: hidden; }
    .panel-head {
      min-height: 56px;
      padding: 13px 15px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .panel-head h2 { margin: 0; font-size: 16px; }
    .panel-head small { color: var(--muted); }
    .toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .segmented { display: inline-flex; background: #eef2f7; border-radius: 8px; padding: 3px; gap: 3px; }
    .segmented button {
      border: 0;
      background: transparent;
      min-height: 31px;
      border-radius: 6px;
      padding: 0 10px;
      color: var(--muted);
    }
    .segmented button.active { background: #fff; color: var(--text); box-shadow: 0 1px 4px rgba(15,23,42,.1); }

    .table-wrap { overflow: auto; max-height: calc(100vh - 330px); min-height: 360px; }
    table { width: 100%; border-collapse: collapse; min-width: 1280px; }
    th, td {
      padding: 11px 10px;
      border-bottom: 1px solid #edf1f6;
      text-align: left;
      white-space: nowrap;
      vertical-align: middle;
    }
    th { color: var(--muted); font-size: 12px; background: #f8fafc; position: sticky; top: 0; z-index: 2; }
    tr:hover td { background: #fffaf0; }
    .link { border: 0; background: transparent; color: var(--blue); padding: 0; }
    tr[data-index] { cursor: pointer; }
    tr[data-index]:hover .link { text-decoration: underline; }
    .muted { color: var(--muted); font-size: 12px; }
    .down { color: var(--red); }
    .up { color: var(--green); }

    .tag { display: inline-flex; align-items: center; justify-content: center; min-height: 24px; border-radius: 999px; padding: 0 9px; font-size: 12px; border: 1px solid transparent; }
    .tag.red { color: var(--red); background: #fff1f2; border-color: #fecdd3; }
    .tag.orange { color: var(--orange); background: #fff7ed; border-color: #fed7aa; }
    .tag.blue { color: var(--blue); background: #eff6ff; border-color: #bfdbfe; }
    .tag.green { color: var(--green); background: #ecfdf3; border-color: #bbf7d0; }
    .tag.gray { color: var(--muted); background: #f2f4f7; border-color: #e5e7eb; }
    .tag.purple { color: var(--purple); background: #f5f3ff; border-color: #ddd6fe; }

    .modal-mask {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,.34);
      opacity: 0;
      pointer-events: none;
      transition: .18s ease;
      z-index: 40;
    }
    .modal-mask.open { opacity: 1; pointer-events: auto; }
    .modal-head {
      padding: 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 14px;
    }
    .modal-head h2 { margin: 0; font-size: 18px; }

    .detail-grid { display: grid; grid-template-columns: repeat(4, minmax(120px, 1fr)); gap: 10px; margin-bottom: 14px; }
    .detail { background: var(--soft); border: 1px solid var(--line); border-radius: 8px; padding: 11px; }
    .detail label { color: var(--muted); font-size: 12px; }
    .detail strong { display: block; margin-top: 5px; font-size: 18px; }

    .modal {
      position: fixed;
      left: 50%;
      top: 50%;
      width: min(940px, 94vw);
      max-height: 88vh;
      overflow: hidden;
      background: #fff;
      border-radius: 10px;
      box-shadow: var(--shadow);
      transform: translate(-50%, -48%) scale(.98);
      opacity: 0;
      pointer-events: none;
      transition: .18s ease;
      z-index: 42;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }
    .modal.open { opacity: 1; pointer-events: auto; transform: translate(-50%, -50%) scale(1); }
    .modal.detail-modal { width: min(1240px, 96vw); }
    .modal-body { overflow: auto; padding: 16px 18px; }
    .detail-table-wrap { overflow: auto; max-height: 52vh; border: 1px solid var(--line); border-radius: 8px; }
    .detail-table-wrap table { min-width: 1120px; }
    .detail-table-wrap table.compact { min-width: 980px; }
    .user-cell { max-width: 150px; white-space: normal; line-height: 1.35; }
    .user-cell strong { display: block; }
    .user-cell .muted { display: block; margin-top: 3px; font-size: 12px; }
    .sort-btn {
      border: 0;
      background: transparent;
      color: inherit;
      padding: 0;
      font: inherit;
      font-weight: 700;
    }
    .sort-btn.active { color: var(--brand); }
    .modal-foot { border-top: 1px solid var(--line); padding: 13px 18px; display: flex; justify-content: flex-end; gap: 10px; }
    .tabs { display: flex; gap: 6px; border-bottom: 1px solid var(--line); margin-bottom: 14px; }
    .tabs button { border: 0; background: transparent; padding: 10px 12px; color: var(--muted); border-bottom: 2px solid transparent; }
    .tabs button.active { color: var(--text); border-bottom-color: var(--brand); }
    .settings-grid { display: grid; grid-template-columns: repeat(2, minmax(240px, 1fr)); gap: 12px; }
    .setting { border: 1px solid var(--line); border-radius: 8px; padding: 13px; display: grid; gap: 8px; }
    .setting label { color: var(--muted); font-size: 12px; }
    .inline { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%) translateY(20px);
      background: #111827;
      color: #fff;
      border-radius: 8px;
      padding: 11px 14px;
      opacity: 0;
      pointer-events: none;
      transition: .2s ease;
      z-index: 80;
      box-shadow: var(--shadow);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .hidden { display: none !important; }

    @media (max-width: 960px) {
      .filters, .kpis, .settings-grid, .detail-grid { grid-template-columns: 1fr; }
      .topbar { align-items: start; flex-direction: column; }
      .content { padding: 14px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div>
      <h1>业务异常监控</h1>
      <p class="subtitle">默认展示今日业务订单，支持筛选异常业务并下钻定位异常客户。</p>
    </div>
    <div class="top-actions">
      <div><strong id="latestTime">最新数据：等待刷新</strong><span id="snapshotInfo">快照：等待记录</span></div>
      <button class="icon-btn primary" id="refreshBtn" title="刷新">↻</button>
      <button class="btn" id="settingsBtn">设置中心</button>
    </div>
  </header>

  <main class="content">
    <section class="filters">
      <select class="field" id="platformSelect"><option value="all">全部平台</option></select>
      <input class="field" id="searchInput" placeholder="搜索业务名称、平台或业务ID">
      <button class="btn primary" id="applyBtn">查询</button>
    </section>

    <section class="source" id="sourceBox">
      <strong>数据状态：</strong><span id="sourceText">等待接口返回。</span>
    </section>

    <section class="kpis">
      <article class="kpi"><label>全部业务</label><strong id="kpiTotalBusiness">0</strong><span>当前接入的业务总数</span></article>
      <article class="kpi"><label>异常业务</label><strong id="kpiAbnormal">0</strong><span>按当前列表规则计算</span></article>
      <article class="kpi"><label>严重异常</label><strong id="kpiCritical">0</strong><span>可触发立即通知</span></article>
      <article class="kpi"><label>影响订单</label><strong id="kpiImpact">0</strong><span>当前值较基准差额</span></article>
      <article class="kpi"><label>异常客户</label><strong id="kpiUsers">0</strong><span>按用户维度计算</span></article>
    </section>

    <section class="panel">
      <div class="panel-head">
        <div>
          <h2>业务列表</h2>
          <small>默认展示全部业务，可在列表内筛选异常类型和排序</small>
        </div>
        <div class="toolbar">
          <div class="segmented" id="metricTabs">
            <button class="active" data-metric="orders">订单</button>
            <button data-metric="commission">佣金</button>
          </div>
          <div class="segmented" id="levelTabs">
            <button class="active" data-level="all">全部</button>
            <button data-level="critical">严重</button>
            <button data-level="major">重点</button>
            <button data-level="minor">轻微</button>
            <button data-level="up">上升</button>
            <button data-level="missing">数据缺失</button>
            <button data-level="normal">正常</button>
          </div>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>序号</th>
              <th><button class="sort-btn" data-sort="platform">平台</button></th>
              <th><button class="sort-btn" data-sort="name">业务名称</button></th>
              <th><button class="sort-btn active" data-sort="today" id="currentHeader">当前订单</button></th>
              <th><button class="sort-btn" data-sort="yesterday" id="baselineHeader">前一日同时刻</button></th>
              <th><button class="sort-btn" data-sort="lastWeek">上周同时刻</button></th>
              <th><button class="sort-btn" data-sort="sevenAvg">近7日同期均值</button></th>
              <th><button class="sort-btn" data-sort="ratio">变化比例</button></th>
              <th><button class="sort-btn" data-sort="impact">影响量</button></th>
              <th><button class="sort-btn" data-sort="level">异常等级</button></th>
              <th><button class="sort-btn" data-sort="users">相关用户</button></th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="businessBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <div class="modal-mask" id="modalMask"></div>
  <section class="modal detail-modal" id="detailModal">
    <div class="modal-head">
      <div><h2 id="detailTitle">业务详情</h2><small id="detailSub">异常客户和趋势判断</small></div>
      <button class="icon-btn" id="closeDetail">×</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
    <div class="modal-foot"><button class="btn" id="closeDetailFoot">关闭</button></div>
  </section>

  <section class="modal" id="settingsModal">
    <div class="modal-head">
      <div><h2>设置中心</h2><small>只放配置，不展示业务数据</small></div>
      <button class="icon-btn" id="closeSettings">×</button>
    </div>
    <div class="modal-body">
      <div class="tabs" id="settingTabs">
        <button class="active" data-tab="rules">异常规则</button>
        <button data-tab="snapshot">快照频率</button>
        <button data-tab="feishu">飞书通知</button>
      </div>
      <div id="tabRules" class="settings-grid">
        <div class="setting"><strong>轻微下降异常</strong><label>比例和影响量同时满足</label><div class="inline"><input class="field" id="minorPct" type="number"><input class="field" id="minorOrders" type="number"></div></div>
        <div class="setting"><strong>重点下降异常</strong><label>进入优先处理</label><div class="inline"><input class="field" id="majorPct" type="number"><input class="field" id="majorOrders" type="number"></div></div>
        <div class="setting"><strong>严重下降异常</strong><label>可立即飞书通知</label><div class="inline"><input class="field" id="criticalPct" type="number"><input class="field" id="criticalOrders" type="number"></div></div>
        <div class="setting"><strong>上升异常</strong><label>识别刷量、重复回传或活动爆发</label><div class="inline"><input class="field" id="upPct" type="number"><input class="field" id="upOrders" type="number"></div></div>
      </div>
      <div id="tabSnapshot" class="settings-grid hidden">
        <div class="setting"><strong>页面自动刷新频率</strong><label>控制页面多久自动请求一次中台最新数据</label><select class="field" id="refreshSeconds"><option value="30">每 30 秒</option><option value="60">每 60 秒</option><option value="120">每 2 分钟</option><option value="300">每 5 分钟</option></select></div>
        <div class="setting"><strong>快照记录频率</strong><label>用于生成昨日同时刻、上周同时刻和近7日同期均值</label><select class="field" id="snapshotMinutes"><option value="10">每 10 分钟</option><option value="30">每 30 分钟</option><option value="60">每 60 分钟</option></select></div>
        <div class="setting"><strong>手动补记</strong><label>立即记录当前业务和用户快照</label><button class="btn primary" id="settingSnapshotBtn">立即记录快照</button></div>
      </div>
      <div id="tabFeishu" class="settings-grid hidden">
        <div class="setting"><strong>Webhook URL</strong><label>保存到 macOS 钥匙串，不写入配置文件</label><input class="field" id="feishuWebhook" placeholder="https://open.feishu.cn/open-apis/bot/v2/hook/..."><span class="muted" id="webhookStatus">未配置</span></div>
        <div class="setting"><strong>签名密钥</strong><label>飞书机器人开启签名校验时填写</label><input class="field" id="feishuSecret" placeholder="签名密钥，可留空"><span class="muted" id="secretStatus">未配置</span></div>
        <div class="setting"><strong>通知频率</strong><label>严重异常可以立即通知</label><select class="field" id="notifyMode"><option value="immediate">严重异常立即通知</option><option value="hourly">每小时汇总</option><option value="daily">每天固定时间汇总</option></select></div>
        <div class="setting"><strong>测试消息</strong><label>保存配置后可测试 Webhook 是否可用</label><button class="btn primary" id="testFeishuBtn">发送测试消息</button><span class="muted" id="testResult">等待测试</span></div>
      </div>
    </div>
    <div class="modal-foot"><button class="btn" id="cancelSettings">取消</button><button class="btn primary" id="saveSettings">保存配置</button></div>
  </section>

  <div class="toast" id="toast">已刷新</div>

  <script>
    const state = { metric: "orders", level: "all", sort: "today", sortDir: "desc", platform: "all", search: "", config: null, businesses: [], users: [], source: {}, dateRange: null, settingsTab: "rules", refreshTimer: null, loading: false, refreshing: false, detailMode: "abnormal", detailRow: null, detailUsers: [], detailRefreshing: false, detailLatestTime: "", publicMode: false, publicUserDetails: {} };
    const $ = s => document.querySelector(s);
    const $$ = s => Array.from(document.querySelectorAll(s));
    const fmt = n => Number(n || 0).toLocaleString("zh-CN");
    const money = n => Number(n || 0).toLocaleString("zh-CN", { maximumFractionDigits: 2 });
    const pct = n => `${n > 0 ? "+" : ""}${Math.round(n * 10) / 10}%`;
    const pad = n => String(n).padStart(2, "0");
    const dayText = date => `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;

    function currentMetricLabel() {
      const label = state.dateRange?.label || "今日";
      return state.metric === "commission" ? `${label}佣金` : `${label}订单`;
    }

    function baselineLabel() {
      return state.dateRange?.baselineLabel || "前一日同时刻";
    }

    function toast(text) {
      $("#toast").textContent = text;
      $("#toast").classList.add("show");
      setTimeout(() => $("#toast").classList.remove("show"), 1800);
    }

    function baseValue(row) {
      const same = row.sameTime || {};
      if (state.metric === "commission") return same.yesterday?.commission ?? same.lastWeek?.commission ?? same.sevenDayAvg?.commission ?? row.yesterdayCommission ?? 0;
      return same.yesterday?.orders ?? same.lastWeek?.orders ?? same.sevenDayAvg?.orders ?? row.yesterdayOrders ?? 0;
    }

    function todayValue(row) {
      if (state.metric === "commission") return row.todayCommission ?? row.todayAmount ?? 0;
      return row.todayOrders ?? 0;
    }

    function compare(row) {
      const today = Number(todayValue(row));
      const base = Number(baseValue(row));
      const diff = today - base;
      const impact = Math.abs(diff);
      const ratio = base ? diff / base * 100 : today ? 100 : 0;
      const rules = state.config?.rules || {};
      let level = "normal", label = "正常";
      if (!base && !today) [level, label] = ["missing", "数据缺失"];
      else if (diff > 0 && ratio >= rules.upPct && impact >= rules.upOrders) [level, label] = ["up", "上升异常"];
      else if (diff < 0) {
        const drop = Math.abs(ratio);
        if (today === 0 && base > 0) [level, label] = ["critical", "严重异常"];
        else if (drop >= rules.criticalPct || impact >= rules.criticalOrders) [level, label] = ["critical", "严重异常"];
        else if (drop >= rules.majorPct && impact >= rules.majorOrders) [level, label] = ["major", "重点异常"];
        else if (drop >= rules.minorPct && impact >= rules.minorOrders) [level, label] = ["minor", "轻微异常"];
      }
      return { today, base, diff, impact, ratio, level, label };
    }

    function tag(level, label) {
      const cls = { critical: "red", major: "orange", minor: "blue", up: "purple", missing: "gray", normal: "green" }[level] || "green";
      return `<span class="tag ${cls}">${label}</span>`;
    }

    function rank(level) {
      return { critical: 5, major: 4, up: 3, minor: 2, missing: 1, normal: 0 }[level] || 0;
    }

    function baselineValue(row, key) {
      const same = row.sameTime || {};
      const data = same[key];
      if (!data) return 0;
      return state.metric === "commission" ? Number(data.commission || 0) : Number(data.orders || 0);
    }

    function sortValue(row, key) {
      if (key === "platform") return row.platform || "";
      if (key === "name") return row.name || "";
      if (key === "today") return row.cmp.today;
      if (key === "yesterday") return baselineValue(row, "yesterday");
      if (key === "lastWeek") return baselineValue(row, "lastWeek");
      if (key === "sevenAvg") return baselineValue(row, "sevenDayAvg");
      if (key === "ratio") return row.cmp.ratio;
      if (key === "impact") return row.cmp.impact;
      if (key === "level") return rank(row.cmp.level);
      if (key === "users") return row.users || row.userIds?.length || 0;
      return 0;
    }

    function sortRows(a, b) {
      const av = sortValue(a, state.sort);
      const bv = sortValue(b, state.sort);
      const dir = state.sortDir === "asc" ? 1 : -1;
      if (typeof av === "string" || typeof bv === "string") return String(av).localeCompare(String(bv), "zh-CN") * dir;
      return (Number(av || 0) - Number(bv || 0)) * dir;
    }

    function filteredBusinesses() {
      let rows = state.businesses.map(row => ({ ...row, cmp: compare(row) }));
      if (state.platform !== "all") rows = rows.filter(row => row.platform === state.platform);
      if (state.level !== "all") rows = rows.filter(row => row.cmp.level === state.level);
      if (state.search) {
        const key = state.search.toLowerCase();
        rows = rows.filter(row => `${row.platform}${row.name}${row.businessId}${row.platformBusinessId || ""}`.toLowerCase().includes(key));
      }
      return rows.sort((a, b) => sortRows(a, b) || rank(b.cmp.level) - rank(a.cmp.level) || b.cmp.impact - a.cmp.impact);
    }

    function abnormalUsers() {
      return state.users.map(row => ({ ...row, cmp: compare(row) })).filter(row => row.cmp.level !== "normal").sort((a, b) => rank(b.cmp.level) - rank(a.cmp.level) || b.cmp.impact - a.cmp.impact);
    }

    function renderPlatforms() {
      const platforms = Array.from(new Set(state.businesses.map(row => row.platform).filter(Boolean))).sort();
      $("#platformSelect").innerHTML = `<option value="all">全部平台</option>` + platforms.map(item => `<option value="${item}">${item}</option>`).join("");
      $("#platformSelect").value = state.platform;
    }

    function renderKpis() {
      const biz = state.businesses.map(compare).filter(item => item.level !== "normal");
      const critical = biz.filter(item => item.level === "critical");
      const impact = biz.filter(item => item.diff < 0).reduce((sum, item) => sum + item.impact, 0);
      $("#kpiTotalBusiness").textContent = fmt(state.businesses.length);
      $("#kpiAbnormal").textContent = fmt(biz.length);
      $("#kpiCritical").textContent = fmt(critical.length);
      $("#kpiImpact").textContent = fmt(impact);
      $("#kpiUsers").textContent = fmt(abnormalUsers().length);
    }

    function renderSource() {
      $("#latestTime").textContent = state.source.latestDataTime ? `最新数据：${state.source.latestDataTime}` : "最新数据：等待刷新";
      $("#snapshotInfo").textContent = `自动刷新：${state.config?.refreshSeconds || 60} 秒｜快照：每 ${state.config?.snapshotMinutes || 30} 分钟`;
      const missing = state.source.missing || [];
      $("#sourceBox").classList.toggle("warn", missing.length > 0);
      $("#sourceText").textContent = state.loading
        ? "数据加载中：正在请求中台业务数据、小时趋势和用户统计，请稍等。"
        : (state.refreshing
          ? "正在刷新最新数据，当前列表先保留上一次结果，刷新完成后会自动更新。"
        : (missing.length ? missing.join("；") : (state.source.cached
          ? `${state.source.cacheFallback ? "当前日期暂无缓存，已显示最近一次有数据缓存" : "当前显示本地缓存"}：${state.source.cacheSavedAt || "未知时间"}。需要最新数据请点右上角刷新。`
          : (state.publicMode ? "当前为公网加密快照，已解密展示业务和用户明细。" : "已接入中台业务数据总览接口；当前固定展示今日数据，今天看前一日同时刻。"))));
    }

    function renderTable() {
      const rows = filteredBusinesses();
      $("#currentHeader").textContent = currentMetricLabel();
      $("#baselineHeader").textContent = baselineLabel();
      $$(".sort-btn").forEach(btn => {
        const active = btn.dataset.sort === state.sort;
        btn.classList.toggle("active", active);
        const baseText = btn.textContent.replace(/[↑↓]$/, "");
        btn.textContent = active ? `${baseText}${state.sortDir === "asc" ? "↑" : "↓"}` : baseText;
      });
      if (state.loading && !rows.length) {
        $("#businessBody").innerHTML = `<tr><td colspan="12" class="muted">数据加载中，请稍等...</td></tr>`;
        return;
      }
      $("#businessBody").innerHTML = rows.length ? rows.map((row, index) => {
        const same = row.sameTime || {};
        return `<tr data-index="${index}">
          <td>${index + 1}</td>
          <td>${row.platform}</td>
          <td><strong>${row.name}</strong></td>
          <td>${state.metric === "commission" ? money(row.cmp.today) : fmt(row.cmp.today)}</td>
          <td>${same.yesterday ? fmt(state.metric === "commission" ? same.yesterday.commission : same.yesterday.orders) : "-"}</td>
          <td>${same.lastWeek ? fmt(state.metric === "commission" ? same.lastWeek.commission : same.lastWeek.orders) : "-"}</td>
          <td>${same.sevenDayAvg ? fmt(state.metric === "commission" ? same.sevenDayAvg.commission : same.sevenDayAvg.orders) : "-"}</td>
          <td class="${row.cmp.diff < 0 ? "down" : row.cmp.diff > 0 ? "up" : ""}">${pct(row.cmp.ratio)}</td>
          <td>${fmt(row.cmp.impact)}</td>
          <td>${tag(row.cmp.level, row.cmp.label)}</td>
          <td>${fmt(row.users || row.userIds?.length || 0)}</td>
          <td><button class="link" data-index="${index}">查看用户</button></td>
        </tr>`;
      }).join("") : `<tr><td colspan="12" class="muted">当前筛选条件下没有业务。</td></tr>`;
    }

    function render() {
      renderPlatforms();
      renderKpis();
      renderSource();
      renderTable();
    }

    async function loadData(manual = false, preferCache = false) {
      const hasOldData = state.businesses.length > 0;
      state.loading = !hasOldData;
      state.refreshing = hasOldData;
      $("#refreshBtn").textContent = "…";
      renderSource();
      renderTable();
      try {
        const today = dayText(new Date());
        const params = new URLSearchParams({
          preset: "today",
          start_date: today,
          end_date: today,
          cache: preferCache ? "1" : "0",
          force: manual ? "1" : "0",
          _: Date.now()
        });
        const res = await fetch(`/api/live-dashboard?${params.toString()}`);
        const data = await res.json();
        state.publicMode = false;
        state.config = data.config;
        state.businesses = data.businesses || [];
        state.users = data.users || [];
        state.dateRange = data.dateRange || null;
        state.source = { ...(data.source || {}), latestDataTime: data.latestDataTime };
        state.loading = false;
        state.refreshing = false;
        fillSettings();
        render();
        if (manual) toast("数据已刷新");
      } catch {
        const publicLoaded = await loadPublicSnapshot();
        if (publicLoaded) {
          state.loading = false;
          state.refreshing = false;
          render();
          return;
        }
        state.loading = false;
        state.refreshing = false;
        render();
        toast("刷新失败");
      } finally {
        $("#refreshBtn").textContent = "↻";
      }
    }

    async function loadPublicSnapshot() {
      try {
        const res = await fetch(`data/business-dashboard-public.enc.json?_=${Date.now()}`);
        if (!res.ok) return false;
        const encrypted = await res.json();
        const data = await decryptPublicSnapshot(encrypted);
        if (!data) return false;
        state.publicMode = true;
        state.config = data.config || state.config || { rules: {} };
        state.businesses = data.businesses || [];
        state.users = [];
        state.publicUserDetails = data.userDetails || {};
        state.dateRange = data.dateRange || null;
        state.source = { ...(data.source || {}), latestDataTime: data.latestDataTime };
        return true;
      } catch {
        return false;
      }
    }

    function base64ToBytes(value) {
      return Uint8Array.from(atob(value), char => char.charCodeAt(0));
    }

    async function derivePublicKey(password, salt, iterations) {
      const baseKey = await crypto.subtle.importKey("raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]);
      return crypto.subtle.deriveKey({ name: "PBKDF2", salt, iterations, hash: "SHA-256" }, baseKey, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
    }

    function cachedPublicPassword() {
      try {
        const saved = JSON.parse(localStorage.getItem("businessDashboardPublicPassword") || "{}");
        if (saved.password && saved.expiresAt > Date.now()) return saved.password;
      } catch {}
      return "";
    }

    function savePublicPassword(password) {
      localStorage.setItem("businessDashboardPublicPassword", JSON.stringify({
        password,
        expiresAt: Date.now() + 7 * 24 * 60 * 60 * 1000
      }));
    }

    async function decryptPublicSnapshot(encrypted) {
      let password = cachedPublicPassword();
      for (let attempt = 0; attempt < 2; attempt += 1) {
        if (!password) password = window.prompt("请输入公网看板访问密码");
        if (!password) return null;
        try {
          const salt = base64ToBytes(encrypted.salt);
          const iv = base64ToBytes(encrypted.iv);
          const tag = base64ToBytes(encrypted.tag);
          const ciphertext = base64ToBytes(encrypted.ciphertext);
          const combined = new Uint8Array(ciphertext.length + tag.length);
          combined.set(ciphertext, 0);
          combined.set(tag, ciphertext.length);
          const key = await derivePublicKey(password, salt, encrypted.iterations || 200000);
          const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, combined);
          savePublicPassword(password);
          return JSON.parse(new TextDecoder().decode(plain));
        } catch {
          localStorage.removeItem("businessDashboardPublicPassword");
          password = "";
          toast("密码错误或公网数据解密失败");
        }
      }
      return null;
    }

    function fillSettings() {
      const cfg = state.config || {};
      const rules = cfg.rules || {};
      for (const key of ["minorPct","minorOrders","majorPct","majorOrders","criticalPct","criticalOrders","upPct","upOrders"]) if ($("#" + key)) $("#" + key).value = rules[key] ?? "";
      $("#refreshSeconds").value = cfg.refreshSeconds || 60;
      $("#snapshotMinutes").value = cfg.snapshotMinutes || 30;
      $("#notifyMode").value = cfg.notification?.mode || "immediate";
      $("#webhookStatus").textContent = cfg.notification?.hasWebhook ? "已配置" : "未配置";
      $("#secretStatus").textContent = cfg.notification?.hasSignSecret ? "已配置" : "未配置";
    }

    function collectSettings() {
      const rules = {};
      for (const key of ["minorPct","minorOrders","majorPct","majorOrders","criticalPct","criticalOrders","upPct","upOrders"]) rules[key] = Number($("#" + key).value || 0);
      return {
        rules,
        refreshSeconds: Number($("#refreshSeconds").value),
        snapshotMinutes: Number($("#snapshotMinutes").value),
        notification: { mode: $("#notifyMode").value, criticalImmediate: $("#notifyMode").value === "immediate", enabled: true },
        feishu: { webhookUrl: $("#feishuWebhook").value.trim(), signSecret: $("#feishuSecret").value.trim() }
      };
    }

    async function saveSettings() {
      const res = await fetch("/api/config", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(collectSettings()) });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || "保存失败");
      state.config = data.config;
      $("#feishuWebhook").value = "";
      $("#feishuSecret").value = "";
      fillSettings();
      setupAutoRefresh();
      render();
      toast("配置已保存");
    }

    async function testFeishu() {
      $("#testResult").textContent = "正在发送...";
      try {
        await saveSettings();
        const res = await fetch("/api/feishu/test", { method: "POST" });
        const data = await res.json();
        $("#testResult").textContent = data.ok ? "测试成功" : data.error || "测试失败";
        toast(data.ok ? "飞书测试成功" : "飞书测试失败");
      } catch (error) {
        $("#testResult").textContent = error.message;
        toast("飞书测试失败");
      }
    }

    async function recordSnapshot() {
      const res = await fetch("/api/snapshot", { method: "POST" });
      const data = await res.json();
      toast(data.ok ? "快照已记录" : "快照失败");
      await loadData(false);
    }

    async function openBusiness(row) {
      state.detailRow = row;
      state.detailMode = "abnormal";
      state.detailUsers = [];
      state.detailRefreshing = false;
      $("#detailTitle").textContent = row.name;
      $("#detailSub").textContent = `${row.platform}｜${row.cmp.label}`;
      $("#modalMask").classList.add("open");
      $("#detailModal").classList.add("open");
      await loadBusinessUsers(row, false);
    }

    async function loadBusinessUsers(row, refresh = false) {
      if (state.publicMode) {
        const detail = state.publicUserDetails[String(row.platformBusinessId || row.businessId)] || state.publicUserDetails[String(row.businessId)] || { rows: [] };
        state.detailUsers = (detail.rows || []).map(user => ({ ...user, cmp: compare(user) })).sort((a, b) => rank(b.cmp.level) - rank(a.cmp.level) || b.cmp.impact - a.cmp.impact);
        state.detailLatestTime = detail.latestDataTime || state.source.latestDataTime || "";
        renderDetail(true);
        return;
      }
      const hasOldUsers = refresh && state.detailUsers.length > 0;
      state.detailRefreshing = true;
      if (hasOldUsers) renderDetail(false);
      else $("#detailBody").innerHTML = `<section class="source"><strong>正在加载：</strong>正在从中台按当前业务拉取用户明细；首次加载会自动翻页并补齐明文手机号，之后默认使用缓存，点“刷新用户”才重新请求。</section>`;
      const today = dayText(new Date());
      const params = new URLSearchParams({
        business_id: row.platformBusinessId || row.businessId || "",
        start_date: state.dateRange?.startDate || today,
        end_date: state.dateRange?.endDate || today,
        page_size: Math.min(5000, Math.max(500, Number(row.users || row.userIds?.length || 0) + 50)),
        sort_field: state.dateRange?.startDate === state.dateRange?.endDate ? state.dateRange.endDate : "period_total",
        sort_order: "desc",
        refresh: refresh ? "1" : "0",
        _: Date.now()
      });
      try {
        const res = await fetch(`/api/business-users?${params.toString()}`);
        const data = await res.json();
        state.detailUsers = (data.users || []).map(user => ({ ...user, cmp: compare(user) })).sort((a, b) => rank(b.cmp.level) - rank(a.cmp.level) || b.cmp.impact - a.cmp.impact);
        state.detailLatestTime = data.latestDataTime || "";
        state.detailRefreshing = false;
        renderDetail(data.cached);
      } catch (error) {
        state.detailRefreshing = false;
        renderDetail(false);
        throw error;
      }
    }

    function renderDetail(cached = false) {
      const row = state.detailRow;
      const allUsers = state.detailUsers || [];
      const abnormal = allUsers.filter(user => user.cmp.level !== "normal");
      const users = state.detailMode === "abnormal" ? abnormal : allUsers;
      $("#detailBody").innerHTML = `
        <div class="detail-grid">
          <div class="detail"><label>${currentMetricLabel()}</label><strong>${fmt(row.cmp.today)}</strong></div>
          <div class="detail"><label>对比基准</label><strong>${fmt(row.cmp.base)}</strong></div>
          <div class="detail"><label>变化比例</label><strong class="${row.cmp.diff < 0 ? "down" : "up"}">${pct(row.cmp.ratio)}</strong></div>
          <div class="detail"><label>异常 / 全部用户</label><strong>${fmt(abnormal.length)} / ${fmt(allUsers.length)}</strong></div>
        </div>
        <div class="toolbar" style="margin-bottom:10px;">
          <div class="segmented">
            <button class="${state.detailMode === "abnormal" ? "active" : ""}" data-detail-mode="abnormal">异常用户 ${fmt(abnormal.length)}</button>
            <button class="${state.detailMode === "all" ? "active" : ""}" data-detail-mode="all">全部用户 ${fmt(allUsers.length)}</button>
          </div>
          <button class="btn" data-detail-refresh="1">刷新用户</button>
          <span class="muted">${state.detailRefreshing ? "正在刷新用户，当前先保留上次结果" : (cached ? "当前使用缓存数据" : "当前为最新请求数据")}｜用户数据时间：${state.detailLatestTime || state.source.latestDataTime || "-"}</span>
        </div>
        <section class="source ${row.sameTime?.hasSnapshot ? "" : "warn"}"><strong>下钻说明：</strong>${row.sameTime?.hasSnapshot ? "已使用历史快照做同时刻比较。" : "当前同时刻历史快照不足，用户对比基准临时使用前一日全日数据；服务会继续按设置频率记录快照。"} 外部列表显示 ${fmt(row.users || row.userIds?.length || 0)} 个用户，当前已加载 ${fmt(allUsers.length)} 个用户；默认只展示异常用户。</section>
        <div class="detail-table-wrap">
          <table class="compact">
            <thead><tr><th>用户</th><th>${currentMetricLabel()}</th><th>昨日同时刻</th><th>上周同时刻</th><th>近7日同期均值</th><th>变化比例</th><th>影响订单</th><th>状态</th></tr></thead>
            <tbody>${users.length ? users.map(user => {
              const same = user.sameTime || {};
              const yesterday = same.yesterday ? (state.metric === "commission" ? same.yesterday.commission : same.yesterday.orders) : user.cmp.base;
              const lastWeek = same.lastWeek ? (state.metric === "commission" ? same.lastWeek.commission : same.lastWeek.orders) : null;
              const sevenAvg = same.sevenDayAvg ? (state.metric === "commission" ? same.sevenDayAvg.commission : same.sevenDayAvg.orders) : null;
              return `<tr><td class="user-cell"><strong>${user.name}</strong><span class="muted">ID：${user.id || "-"}｜${user.phone || "-"}</span><span class="muted">版本：${user.version || "-"}</span></td><td>${fmt(user.cmp.today)}</td><td>${yesterday ? fmt(yesterday) : "-"}</td><td>${lastWeek !== null ? fmt(lastWeek) : "-"}</td><td>${sevenAvg !== null ? fmt(sevenAvg) : "-"}</td><td class="${user.cmp.diff < 0 ? "down" : user.cmp.diff > 0 ? "up" : ""}">${pct(user.cmp.ratio)}</td><td>${fmt(user.cmp.impact)}</td><td>${tag(user.cmp.level, user.cmp.label)}</td></tr>`;
            }).join("") : `<tr><td colspan="8" class="muted">${state.detailMode === "abnormal" ? "当前业务没有达到阈值的异常用户。" : "当前业务没有返回用户明细。"}</td></tr>`}</tbody>
          </table>
        </div>`;
    }

    function setupAutoRefresh() {
      if (state.refreshTimer) clearInterval(state.refreshTimer);
      const seconds = Math.max(10, Number(state.config?.refreshSeconds || 60));
      state.refreshTimer = setInterval(() => loadData(false), seconds * 1000);
    }

    function openSettings() {
      $("#modalMask").classList.add("open");
      $("#settingsModal").classList.add("open");
    }
    function closeSettings() {
      $("#modalMask").classList.remove("open");
      $("#settingsModal").classList.remove("open");
    }
    function closeDetail() {
      $("#modalMask").classList.remove("open");
      $("#detailModal").classList.remove("open");
      $("#settingsModal").classList.remove("open");
    }

    $("#metricTabs").addEventListener("click", e => {
      const btn = e.target.closest("button");
      if (!btn) return;
      state.metric = btn.dataset.metric;
      $$("#metricTabs button").forEach(item => item.classList.toggle("active", item === btn));
      render();
    });
    $("#levelTabs").addEventListener("click", e => {
      const btn = e.target.closest("button");
      if (!btn) return;
      state.level = btn.dataset.level;
      $$("#levelTabs button").forEach(item => item.classList.toggle("active", item === btn));
      render();
    });
    $$(".sort-btn").forEach(btn => btn.addEventListener("click", () => {
      state.sortDir = state.sort === btn.dataset.sort && state.sortDir === "desc" ? "asc" : "desc";
      state.sort = btn.dataset.sort;
      render();
    }));
    $("#platformSelect").addEventListener("change", e => { state.platform = e.target.value; render(); });
    $("#searchInput").addEventListener("input", e => { state.search = e.target.value.trim(); render(); });
    $("#applyBtn").addEventListener("click", () => loadData(true));
    $("#refreshBtn").addEventListener("click", () => loadData(true));
    $("#settingsBtn").addEventListener("click", openSettings);
    $("#closeSettings").addEventListener("click", closeSettings);
    $("#cancelSettings").addEventListener("click", closeSettings);
    $("#modalMask").addEventListener("click", closeDetail);
    $("#closeDetail").addEventListener("click", closeDetail);
    $("#closeDetailFoot").addEventListener("click", closeDetail);
    $("#businessBody").addEventListener("click", e => {
      const target = e.target.closest("[data-index]");
      if (target) openBusiness(filteredBusinesses()[Number(target.dataset.index)]).catch(error => toast(error.message || "用户明细加载失败"));
    });
    $("#detailBody").addEventListener("click", e => {
      const mode = e.target.closest("[data-detail-mode]");
      if (mode) {
        state.detailMode = mode.dataset.detailMode;
        renderDetail(true);
        return;
      }
      const refresh = e.target.closest("[data-detail-refresh]");
      if (refresh && state.detailRow) loadBusinessUsers(state.detailRow, true).catch(error => toast(error.message || "用户刷新失败"));
    });
    $("#settingTabs").addEventListener("click", e => {
      const btn = e.target.closest("button");
      if (!btn) return;
      state.settingsTab = btn.dataset.tab;
      $$("#settingTabs button").forEach(item => item.classList.toggle("active", item === btn));
      $("#tabRules").classList.toggle("hidden", state.settingsTab !== "rules");
      $("#tabSnapshot").classList.toggle("hidden", state.settingsTab !== "snapshot");
      $("#tabFeishu").classList.toggle("hidden", state.settingsTab !== "feishu");
    });
    $("#saveSettings").addEventListener("click", () => saveSettings().then(closeSettings).catch(error => toast(error.message)));
    $("#testFeishuBtn").addEventListener("click", testFeishu);
    $("#settingSnapshotBtn").addEventListener("click", recordSnapshot);

    loadData(false, true).then(setupAutoRefresh);
  </script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>云瞻数据看板</title>
  <style>
    :root {
      --bg: #eef2f6;
      --panel: #fff;
      --text: #182230;
      --muted: #667085;
      --line: #d9e0e8;
      --brand: #e88a00;
      --brand-soft: #fff7ed;
      --shadow: 0 8px 24px rgba(15, 23, 42, .08);
      --sidebar-width: 220px;
      --sidebar-closed: 58px;
    }

    * { box-sizing: border-box; }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      overflow: hidden;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .shell {
      height: 100%;
      display: grid;
      grid-template-columns: var(--sidebar-width) minmax(0, 1fr);
      transition: grid-template-columns .18s ease;
    }

    .shell.sidebar-collapsed {
      grid-template-columns: var(--sidebar-closed) minmax(0, 1fr);
    }

    .sidebar {
      min-width: 0;
      background: var(--panel);
      border-right: 1px solid var(--line);
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
      position: relative;
      z-index: 2;
    }

    .side-head {
      min-height: 62px;
      padding: 14px 12px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .brand {
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: 17px;
      line-height: 1.3;
      white-space: nowrap;
    }

    .desc {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .collapse-btn {
      width: 34px;
      height: 34px;
      flex: 0 0 auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .collapse-icon {
      display: block;
      width: 12px;
      height: 12px;
      border-top: 2px solid currentColor;
      border-left: 2px solid currentColor;
      transform: rotate(-45deg);
    }

    .sidebar-collapsed .collapse-icon {
      transform: rotate(135deg);
    }

    .nav {
      padding: 10px 8px;
      display: grid;
      align-content: start;
      gap: 8px;
    }

    .nav-btn {
      min-height: 44px;
      width: 100%;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--text);
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr);
      align-items: center;
      gap: 8px;
      padding: 0 10px;
      text-align: left;
    }

    .nav-btn[aria-selected="true"] {
      background: var(--brand-soft);
      border-color: #fed7aa;
      color: var(--brand);
      font-weight: 700;
    }

    .nav-icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: #f2f4f7;
      color: inherit;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 700;
    }

    .nav-text {
      min-width: 0;
    }

    .nav-title {
      display: block;
      font-size: 14px;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .nav-desc {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .side-foot {
      padding: 10px 8px;
      border-top: 1px solid var(--line);
    }

    .open-link {
      min-height: 38px;
      width: 100%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      font-size: 13px;
      text-decoration: none;
      padding: 0 10px;
      white-space: nowrap;
    }

    .sidebar-collapsed .brand,
    .sidebar-collapsed .nav-text,
    .sidebar-collapsed .open-text {
      display: none;
    }

    .sidebar-collapsed .side-head,
    .sidebar-collapsed .side-foot {
      justify-content: center;
      padding-left: 8px;
      padding-right: 8px;
    }

    .sidebar-collapsed .nav-btn {
      grid-template-columns: 1fr;
      justify-items: center;
      padding: 0;
    }

    .viewer {
      position: relative;
      min-width: 0;
      min-height: 0;
      background: #fff;
    }

    .board-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: none;
      background: #fff;
    }

    .board-frame.active {
      display: block;
    }

    .frame-loading {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: none;
      align-items: center;
      justify-content: center;
      background: #f8fafc;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      text-align: center;
      padding: 24px;
    }

    .frame-loading.show {
      display: flex;
    }

    .gate {
      position: fixed;
      inset: 0;
      z-index: 10;
      background: linear-gradient(135deg, #f7f9fc, #eef2f6);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .gate.show {
      display: flex;
    }

    .gate-card {
      width: min(420px, 100%);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 22px;
    }

    .gate-card h2 {
      margin: 0;
      font-size: 20px;
    }

    .gate-card p {
      margin: 8px 0 16px;
      color: var(--muted);
      line-height: 1.6;
    }

    .password-row {
      display: flex;
      gap: 8px;
    }

    .password-row input {
      min-width: 0;
      flex: 1;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
    }

    .password-row button {
      min-height: 40px;
      border: 1px solid var(--brand);
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      font-weight: 700;
      padding: 0 16px;
    }

    .password-row button:disabled {
      opacity: .65;
      cursor: wait;
    }

    .gate-error {
      min-height: 20px;
      margin-top: 10px;
      color: #dc2626;
      font-size: 13px;
    }

    @media (max-width: 760px) {
      body { overflow: auto; }

      .shell,
      .shell.sidebar-collapsed {
        min-height: 100%;
        height: auto;
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(720px, 1fr);
      }

      .sidebar {
        grid-template-rows: auto auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .side-head {
        min-height: 52px;
        padding: 10px 14px;
      }

      .nav {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
        padding: 8px 10px 10px;
      }

      .nav-btn {
        min-height: 56px;
        grid-template-columns: 22px minmax(0, 1fr);
        gap: 5px;
        padding: 5px 6px;
      }

      .nav-icon {
        width: 22px;
        height: 22px;
        border-radius: 6px;
        font-size: 12px;
      }

      .nav-title {
        font-size: 12px;
      }

      .nav-desc {
        margin-top: 1px;
        font-size: 10px;
      }

      .side-foot,
      .collapse-btn {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="gate" id="passwordGate" aria-live="polite">
    <div class="gate-card">
      <h2>访问验证</h2>
      <p>请输入公网看板访问密码。验证通过后，本浏览器 7 天内不需要重复输入。</p>
      <form class="password-row" id="passwordForm">
        <input id="passwordInput" type="password" autocomplete="current-password" placeholder="访问密码">
        <button type="submit">进入</button>
      </form>
      <div class="gate-error" id="gateError"></div>
    </div>
  </div>

  <div class="shell" id="shell">
    <aside class="sidebar" aria-label="看板切换">
      <div class="side-head">
        <div class="brand">
          <h1>云瞻数据看板</h1>
          <div class="desc">统一入口</div>
        </div>
        <button class="collapse-btn" id="collapseBtn" type="button" title="收起或展开侧边栏" aria-label="收起或展开侧边栏">
          <span class="collapse-icon" aria-hidden="true"></span>
        </button>
      </div>

      <nav class="nav">
        <button class="nav-btn" type="button" data-board="activity" aria-selected="true" title="激励活动看板">
          <span class="nav-icon">奖</span>
          <span class="nav-text">
            <span class="nav-title">激励活动看板</span>
            <span class="nav-desc">活动核销与预估奖励</span>
          </span>
        </button>
        <button class="nav-btn" type="button" data-board="business" aria-selected="false" title="用户内部看板">
          <span class="nav-icon">人</span>
          <span class="nav-text">
            <span class="nav-title">用户内部看板</span>
            <span class="nav-desc">业务异常与用户明细</span>
          </span>
        </button>
        <button class="nav-btn" type="button" data-board="focus" aria-selected="false" title="重点用户看板">
          <span class="nav-icon">重</span>
          <span class="nav-text">
            <span class="nav-title">重点用户看板</span>
            <span class="nav-desc">跨业务关注用户订单</span>
          </span>
        </button>
      </nav>

      <div class="side-foot"></div>
    </aside>

    <main class="viewer">
      <div class="frame-loading" id="frameLoading">正在加载看板数据...</div>
      <iframe class="board-frame active" id="activityFrame" data-board-frame="activity" title="激励活动看板" src="about:blank"></iframe>
      <iframe class="board-frame" id="businessFrame" data-board-frame="business" title="用户内部看板" src="about:blank"></iframe>
      <iframe class="board-frame" id="focusFrame" data-board-frame="focus" title="重点用户看板" src="about:blank"></iframe>
    </main>
  </div>

  <script>
    const isLocalAccess = ["", "localhost", "127.0.0.1"].includes(location.hostname) || location.protocol === "file:";
    const boards = {
      activity: {
        title: "激励活动看板",
        localUrl: "./meituan-dashboard-preview.html",
        publicUrl: "./meituan-dashboard-preview.html"
      },
      business: {
        title: "用户内部看板",
        localUrl: "http://127.0.0.1:8791/business-user-dashboard-prototype.html?embed=1&v=20260716-global-focus-v2",
        publicUrl: "./business-user-dashboard-prototype.html?embed=1&v=20260716-global-focus-v2"
      },
      focus: {
        title: "重点用户看板",
        localUrl: "http://127.0.0.1:8791/business-user-dashboard-prototype.html?embed=1&view=focus&v=20260716-global-focus-v2",
        publicUrl: "./business-user-dashboard-prototype.html?embed=1&view=focus&v=20260716-global-focus-v2"
      }
    };

    const shell = document.getElementById("shell");
    const frames = {
      activity: document.getElementById("activityFrame"),
      business: document.getElementById("businessFrame"),
      focus: document.getElementById("focusFrame")
    };
    const frameLoading = document.getElementById("frameLoading");
    const navButtons = Array.from(document.querySelectorAll(".nav-btn"));
    const collapseBtn = document.getElementById("collapseBtn");
    const passwordGate = document.getElementById("passwordGate");
    const passwordForm = document.getElementById("passwordForm");
    const passwordInput = document.getElementById("passwordInput");
    const gateError = document.getElementById("gateError");
    let publicUnlocked = isLocalAccess;
    let activeBoardKey = "activity";
    let loadingDelayTimer = null;
    let loadingHideTimer = null;
    const loadedBoards = new Set();

    function boardUrl(board) {
      return isLocalAccess ? board.localUrl : board.publicUrl;
    }

    function publicFrameUrl(url, { fresh = false } = {}) {
      if (isLocalAccess || url === "about:blank") return url;
      if (!fresh) return url;
      const next = new URL(url, location.href);
      next.searchParams.set("ts", String(Date.now()));
      return next.toString();
    }

    function clearFrameLoadingTimers() {
      if (loadingDelayTimer) clearTimeout(loadingDelayTimer);
      if (loadingHideTimer) clearTimeout(loadingHideTimer);
      loadingDelayTimer = null;
      loadingHideTimer = null;
    }

    function showFrameLoading(text = "正在加载看板数据...") {
      clearFrameLoadingTimers();
      frameLoading.textContent = text;
      frameLoading.classList.add("show");
      loadingHideTimer = setTimeout(hideFrameLoading, 5000);
    }

    function scheduleFrameLoading(text = "正在加载看板数据...", delayMs = 1500) {
      clearFrameLoadingTimers();
      frameLoading.textContent = text;
      frameLoading.classList.remove("show");
      loadingDelayTimer = setTimeout(() => showFrameLoading(text), delayMs);
    }

    function hideFrameLoading() {
      clearFrameLoadingTimers();
      frameLoading.classList.remove("show");
    }

    function activateFrame(boardKey) {
      Object.entries(frames).forEach(([key, item]) => {
        item.classList.toggle("active", key === boardKey);
      });
    }

    function setBoard(boardKey, shouldUpdateHash = true, options = {}) {
      const resolvedKey = boards[boardKey] ? boardKey : "activity";
      const board = boards[resolvedKey];
      const url = boardUrl(board);
      const frame = frames[resolvedKey];
      const shouldLoad = publicUnlocked && (!loadedBoards.has(resolvedKey) || options.fresh);

      if (publicUnlocked) {
        activateFrame(resolvedKey);
        if (shouldLoad) {
          scheduleFrameLoading(resolvedKey === "activity" ? "正在加载活动看板..." : resolvedKey === "focus" ? "正在加载重点用户看板..." : "正在加载用户看板...");
          frame.src = publicFrameUrl(url, { fresh: Boolean(options.fresh) });
        } else {
          hideFrameLoading();
        }
      } else {
        Object.values(frames).forEach(item => { item.src = "about:blank"; });
        loadedBoards.clear();
        hideFrameLoading();
      }
      frame.title = board.title;
      activeBoardKey = resolvedKey;
      navButtons.forEach((button) => {
        button.setAttribute("aria-selected", String(button.dataset.board === resolvedKey));
      });

      if (shouldUpdateHash) {
        history.replaceState(null, "", `#${resolvedKey}`);
      }
    }

    function applySidebarState(collapsed) {
      shell.classList.toggle("sidebar-collapsed", collapsed);
      localStorage.setItem("dashboardSidebarCollapsed", collapsed ? "1" : "0");
    }

    function base64ToBytes(value) {
      return Uint8Array.from(atob(value), char => char.charCodeAt(0));
    }

    async function derivePublicKey(password, salt, iterations) {
      const baseKey = await crypto.subtle.importKey("raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]);
      return crypto.subtle.deriveKey({ name: "PBKDF2", salt, iterations, hash: "SHA-256" }, baseKey, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
    }

    function cachedPublicPassword() {
      try {
        const saved = JSON.parse(localStorage.getItem("businessDashboardPublicPassword") || "{}");
        if (saved.password && saved.expiresAt > Date.now()) return saved.password;
      } catch {}
      return "";
    }

    function savePublicPassword(password) {
      localStorage.setItem("businessDashboardPublicPassword", JSON.stringify({
        password,
        expiresAt: Date.now() + 7 * 24 * 60 * 60 * 1000
      }));
    }

    async function verifyPublicPassword(password) {
      let res = await fetch(`data/public-auth-check.enc.json?_=${Date.now()}`);
      if (!res.ok) res = await fetch(`data/business-dashboard-public.enc.json?_=${Date.now()}`);
      if (!res.ok) throw new Error("公网加密数据不存在，暂时无法验证密码。");
      const encrypted = await res.json();
      const salt = base64ToBytes(encrypted.salt);
      const iv = base64ToBytes(encrypted.iv);
      const tag = base64ToBytes(encrypted.tag);
      const ciphertext = base64ToBytes(encrypted.ciphertext);
      const combined = new Uint8Array(ciphertext.length + tag.length);
      combined.set(ciphertext, 0);
      combined.set(tag, ciphertext.length);
      const key = await derivePublicKey(password, salt, encrypted.iterations || 200000);
      await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, combined);
    }

    async function unlockPublicAccess(password) {
      gateError.textContent = "";
      try {
        gateError.textContent = "正在验证密码，请稍候...";
        await verifyPublicPassword(password);
        savePublicPassword(password);
        publicUnlocked = true;
        passwordGate.classList.remove("show");
        setBoard(location.hash.replace("#", "") || "activity", false);
        return true;
      } catch (error) {
        if (!error?.message?.startsWith("公网")) localStorage.removeItem("businessDashboardPublicPassword");
        gateError.textContent = error?.message?.startsWith("公网") ? error.message : "密码错误或公网数据解密失败，请重新输入。";
        passwordInput.focus();
        passwordInput.select();
        return false;
      }
    }

    async function initPublicGate() {
      if (isLocalAccess) return;
      const cached = cachedPublicPassword();
      if (cached) {
        publicUnlocked = true;
        passwordGate.classList.remove("show");
        setBoard(location.hash.replace("#", "") || "activity", false);
        return;
      }
      passwordGate.classList.add("show");
      passwordInput.focus();
    }

    navButtons.forEach((button) => {
      button.addEventListener("click", () => setBoard(button.dataset.board));
    });

    Object.entries(frames).forEach(([key, item]) => {
      item.addEventListener("load", () => {
        if (item.src === "about:blank") return;
        loadedBoards.add(key);
        if (key === activeBoardKey) hideFrameLoading();
      });
    });

    collapseBtn.addEventListener("click", () => {
      applySidebarState(!shell.classList.contains("sidebar-collapsed"));
    });

    passwordForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const password = passwordInput.value.trim();
      if (!password) {
        gateError.textContent = "请输入访问密码。";
        return;
      }
      const button = passwordForm.querySelector("button");
      const originalText = button.textContent;
      button.disabled = true;
      button.textContent = "进入中...";
      try {
        await unlockPublicAccess(password);
      } finally {
        button.disabled = false;
        button.textContent = originalText;
      }
    });

    window.addEventListener("hashchange", () => {
      setBoard(location.hash.replace("#", ""), false);
    });

    applySidebarState(localStorage.getItem("dashboardSidebarCollapsed") === "1");
    setBoard(location.hash.replace("#", "") || "activity", false);
    initPublicGate();
  </script>
</body>
</html>

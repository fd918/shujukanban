<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>云瞻数据看板</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #fff;
      --text: #182230;
      --muted: #667085;
      --line: #d9e0e8;
      --brand: #e88a00;
      --brand-soft: #fff7ed;
      --shadow: 0 8px 24px rgba(15, 23, 42, .08);
    }

    * { box-sizing: border-box; }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      overflow: hidden;
    }

    .shell {
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      min-height: 64px;
      background: rgba(255, 255, 255, .96);
      border-bottom: 1px solid var(--line);
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 12px 22px;
      position: relative;
      z-index: 2;
    }

    .brand {
      min-width: 180px;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.3;
    }

    .desc {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .tabs {
      display: inline-grid;
      grid-template-columns: repeat(2, minmax(150px, 1fr));
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fafc;
    }

    .tab {
      min-height: 38px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      padding: 0 14px;
      white-space: nowrap;
    }

    .tab[aria-selected="true"] {
      background: var(--brand-soft);
      color: var(--brand);
      box-shadow: inset 0 0 0 1px #fed7aa;
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      min-width: 180px;
    }

    .open-link {
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      font-size: 13px;
      text-decoration: none;
      padding: 0 12px;
      white-space: nowrap;
    }

    .frame-wrap {
      min-height: 0;
      background: var(--bg);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #fff;
    }

    @media (max-width: 760px) {
      body { overflow: auto; }

      .shell {
        min-height: 100%;
        height: auto;
        grid-template-rows: auto minmax(680px, 1fr);
      }

      .topbar {
        align-items: stretch;
        flex-direction: column;
        gap: 10px;
        padding: 12px;
      }

      .brand,
      .actions {
        min-width: 0;
        width: 100%;
      }

      .tabs {
        width: 100%;
        grid-template-columns: 1fr;
      }

      .open-link {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <h1>云瞻数据看板</h1>
        <div class="desc" id="currentDesc">激励活动数据与用户内部数据统一入口</div>
      </div>

      <nav class="tabs" aria-label="看板切换">
        <button class="tab" type="button" data-board="activity" aria-selected="true">激励活动看板</button>
        <button class="tab" type="button" data-board="business" aria-selected="false">用户内部看板</button>
      </nav>

      <div class="actions">
        <a class="open-link" id="openCurrent" href="./meituan-dashboard-preview.html">单独打开当前看板</a>
      </div>
    </header>

    <main class="frame-wrap">
      <iframe id="boardFrame" title="激励活动看板" src="./meituan-dashboard-preview.html"></iframe>
    </main>
  </div>

  <script>
    const boards = {
      activity: {
        title: "激励活动看板",
        desc: "查看美团联盟活动核销金额、档位缺口和预计奖励",
        url: "./meituan-dashboard-preview.html"
      },
      business: {
        title: "用户内部看板",
        desc: "查看云瞻业务异常、用户明细和实时监控数据",
        url: "./business-user-dashboard-prototype.html"
      }
    };

    const frame = document.getElementById("boardFrame");
    const desc = document.getElementById("currentDesc");
    const openCurrent = document.getElementById("openCurrent");
    const tabs = Array.from(document.querySelectorAll(".tab"));

    function setBoard(boardKey, shouldUpdateHash = true) {
      const resolvedKey = boards[boardKey] ? boardKey : "activity";
      const board = boards[resolvedKey];

      frame.src = board.url;
      frame.title = board.title;
      desc.textContent = board.desc;
      openCurrent.href = board.url;

      tabs.forEach((tab) => {
        tab.setAttribute("aria-selected", String(tab.dataset.board === resolvedKey));
      });

      if (shouldUpdateHash) {
        history.replaceState(null, "", `#${resolvedKey}`);
      }
    }

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => setBoard(tab.dataset.board));
    });

    window.addEventListener("hashchange", () => {
      setBoard(location.hash.replace("#", ""), false);
    });

    setBoard(location.hash.replace("#", "") || "activity", false);
  </script>
</body>
</html>
